<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDeals254</title><!-- GOOGLE FONT --><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{font-family:'Poppins',sans-serif;margin:0;background:#0f0f0f;color:#fff;}
header{padding:15px;text-align:center;font-size:22px;font-weight:600;background:#000;letter-spacing:1px;}
.container{padding:15px;}
input{width:100%;padding:12px;margin:6px 0;border-radius:12px;border:none;outline:none;}
button{padding:12px;background:#ff3c3c;color:#fff;border:none;border-radius:12px;width:100%;cursor:pointer;font-weight:600;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;margin-top:20px;}
.card{background:#1a1a1a;padding:10px;border-radius:16px;text-align:center;transition:0.3s;transform:scale(0.95);opacity:0;animation:fadeIn 0.6s forwards;}
.card:hover{transform:scale(1.03);}
.card img{width:100%;height:120px;object-fit:cover;border-radius:12px;}
.btn{display:inline-block;margin-top:10px;padding:8px 12px;background:#ff3c3c;color:white;border-radius:10px;text-decoration:none;font-size:14px;}
.admin{display:none;background:#111;padding:10px;border-radius:12px;margin-top:10px;}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px) scale(0.9);} 
  to{opacity:1;transform:translateY(0) scale(1);} 
}

.glow{
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 5px #ff3c3c;} 
  to{box-shadow:0 0 20px #ff3c3c;} 
}

</style></head>
<body><header class="glow">🔥 SmartDeals254</header><div class="container"><input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()"><button onclick="toggleAdmin()">🔐 Admin Panel</button>

<div class="admin" id="adminPanel">
<h3>Add Product</h3>
<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">
<input type="text" id="image" placeholder="Image URL">
<input type="text" id="link" placeholder="Affiliate Link">
<button onclick="addProduct()">Add Product</button>
</div><div class="products" id="productList"></div></div><script>
let adminOpen=false;

function toggleAdmin(){
  let pass=prompt("Enter admin password:");
  if(pass==="2540"){
    adminOpen=!adminOpen;
    document.getElementById('adminPanel').style.display=adminOpen?'block':'none';
  }else{
    alert("Wrong password");
  }
}

function addProduct(){
  let name=document.getElementById('name').value;
  let price=document.getElementById('price').value;
  let image=document.getElementById('image').value;
  let link=document.getElementById('link').value;

  if(!name||!link){alert('Add name and link');return;}

  let product={name,price,image,link};

  let products=JSON.parse(localStorage.getItem('products')||'[]');
  products.unshift(product);
  localStorage.setItem('products',JSON.stringify(products));

  displayProducts();
}

function displayProducts(){
  let list=document.getElementById('productList');
  list.innerHTML='';

  let products=JSON.parse(localStorage.getItem('products')||'[]');

  products.forEach((p,i)=>{
    list.innerHTML+=`\
    <div class="card" style="animation-delay:${i*0.05}s">\
      <img src="${p.image||'https://via.placeholder.com/150'}">\
      <h4>${p.name}</h4>\
      <p>${p.price||''}</p>\
      <a href="${p.link}" class="btn" target="_blank">Buy Now</a>\
    </div>`;
  });
}

function searchProduct(){
  let input=document.getElementById('search').value.toLowerCase();
  let cards=document.getElementsByClassName('card');

  for(let i=0;i<cards.length;i++){
    let title=cards[i].getElementsByTagName('h4')[0].innerText.toLowerCase();
    cards[i].style.display=title.includes(input)?'block':'none';
  }
}

window.onload=displayProducts;
</script></body>
</html>
